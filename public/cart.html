<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Магазин электроники</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>📱 Магазин электроники</h1>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <div class="cart-icon active" onclick="window.location.href='cart.html'">
                    🛒 Корзина
                    <span id="cart-count" class="cart-count">0</span>
                </div>
                <div id="user-info" class="user-info">
                    <span id="user-name"></span>
                    <button id="logout-btn" class="logout-btn">Выйти</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="cart-container">
            <h2>Корзина</h2>
            <div id="cart-items" class="cart-items">
                <!-- товары в корзине -->
            </div>
            <div id="cart-total" class="cart-total">
                <h3>Итого: <span id="total-price">0</span> ₽</h3>
                <button id="checkout-btn" class="btn-primary">Оформить заказ</button>
            </div>
        </div>
    </main>

    <!-- оформ заказа -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Оформление заказа</h2>
            <form id="order-form">
                <div class="form-group">
                    <label for="fullname">ФИО:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="address">Адрес доставки:</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Подтвердить заказ</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; Магазин электроники - Ляпина А.В.</p>
        </div>
    </footer>
    
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
